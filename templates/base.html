<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}JD to Roadmap AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-rocket-takeoff"></i> JD-to-Roadmap AI</a>
            <div>
                {% if current_user.is_authenticated %}
                    <a href="/history" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-clock-history"></i> My History</a>
                    <a href="/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</a>
                {% else %}
                    <a href="/login" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                    <a href="/signup" class="btn btn-outline-light btn-sm"><i class="bi bi-person-plus"></i> Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
