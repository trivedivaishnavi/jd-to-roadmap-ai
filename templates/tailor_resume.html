{% extends "base.html" %}
{% block content %}
<div class="hero">
    <div class="hero-icon"><i class="bi bi-file-earmark-text"></i></div>
    <h1>Tailor My Resume</h1>
    <p class="text-muted">Upload your resume and paste a job description — we'll show you what keywords you're missing and how to honestly work them in.</p>
</div>

<form action="/tailor-resume" method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label fw-bold">Upload your resume (PDF)</label>
        <input type="file" name="resume_file" class="form-control" accept=".pdf" required>
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Paste the job description</label>
        <textarea name="jd_text" class="form-control" rows="8" placeholder="Paste job description here..." required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Analyze My Resume</button>
</form>
{% endblock %}
