{% extends "base.html" %}
{% block content %}
<h1 class="mb-3">Welcome to JD-to-Roadmap AI</h1>
<p class="text-muted">Paste 1-3 job descriptions for the same type of role, then tell us what skills you already have.</p>

<form action="/analyze" method="POST">
    <div class="mb-3">
        <label class="form-label fw-bold">Job Description 1</label>
        <textarea name="jd_text_1" class="form-control" rows="6" placeholder="Paste job description here..."></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Job Description 2 (optional)</label>
        <textarea name="jd_text_2" class="form-control" rows="6" placeholder="Paste another similar job posting..."></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Job Description 3 (optional)</label>
        <textarea name="jd_text_3" class="form-control" rows="6" placeholder="Paste another similar job posting..."></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Your GitHub username (optional, for auto skill detection)</label>
        <input type="text" name="github_username" class="form-control" placeholder="e.g. trivedivaishnavi">
    </div>

    <label class="form-label fw-bold">Which of these do you already know? (check all that apply)</label>
    <div class="row mb-3">
        {% for skill in all_skills %}
        <div class="col-md-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="known_skills" value="{{ skill }}" id="skill{{ loop.index }}">
                <label class="form-check-label" for="skill{{ loop.index }}">{{ skill }}</label>
            </div>
        </div>
        {% endfor %}
    </div>

    <button type="submit" class="btn btn-primary">Analyze</button>
</form>
{% endblock %}
