{% extends "base.html" %}

{% block content %}
<h1 class="mb-3">Welcome to JD-to-Roadmap AI</h1>
<p class="text-muted">Paste a job description below to get started.</p>

<form action="/analyze" method="POST">
    <div class="mb-3">
        <textarea name="jd_text" class="form-control" rows="10" placeholder="Paste job description here..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Analyze</button>
</form>
{% endblock %}
