{% extends "base.html" %}
{% block content %}
<h1 class="mb-3">Welcome to JD-to-Roadmap AI</h1>
<p class="text-muted">Paste a job description below, then tell us what skills you already have.</p>

<form action="/analyze" method="POST">
    <div class="mb-3">
        <textarea name="jd_text" class="form-control" rows="8" placeholder="Paste job description here..."></textarea>
    </div>

    <label class="form-label fw-bold">Which of these do you already know? (check all that apply)</label>
    <div class="row mb-3">
        {% for skill in all_skills %}
        <div class="col-md-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="known_skills" value="{{ skill }}" id="skill{{ loop.index }}">
                <label class="form-check-label" for="skill{{ loop.index }}">{{ skill }}</label>
            </div>
        </div>
        {% endfor %}
    </div>

    <button type="submit" class="btn btn-primary">Analyze</button>
</form>
{% endblock %}
